apiVersion: apps/v1
kind: Deployment

metadata:
  name: grafana

spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana

    spec:

      securityContext:
        fsGroup: 472
      initContainers:
      - name: fix-permissions
        image: busybox
        command:
        - sh
        - -c
        - |
          chown -R 472:472 /var/lib/grafana
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana

      containers:
      - name: grafana
        image: grafana/grafana-oss:latest

        ports:
        - containerPort: 3000

        env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin

        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin

        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana

      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-pvc
